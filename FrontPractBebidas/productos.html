<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo Premium</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="productos.html">Productos</a>
        <a href="detalles.html">Comparativa</a>
        <a href="pedido.html">Pedido</a>
    </nav>

    <main>
        <h2 style="text-align:center; color: var(--color-oro);">Nuestra Bodega</h2>
        <div class="contenedor-productos">
            
            <div class="producto-card">
                <img src="https://images.unsplash.com/photo-1510812431401-41d2bd2722f3?w=500" alt="Vino Tinto">
                <h3>Vino Tinto Reserva</h3>
                <p class="precio">18.50€</p>
                <button class="btn-add" onclick="agregar('Vino Tinto Reserva', 18.50)">Añadir a la cesta</button>
            </div>

            <div class="producto-card">
                <img src="https://lossaboresdemexico.com/wp-content/uploads/2015/01/stk200525rke-1024x1024.jpg" alt="Vino Blanco">
                <h3>Vino Blanco Joven</h3>
                <p class="precio">12.00€</p>
                <button class="btn-add" onclick="agregar('Vino Blanco Joven', 12.00)">Añadir a la cesta</button>
            </div>

            <div class="producto-card">
                <img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?w=500" alt="Whiskey">
                <h3>Whiskey Escocés</h3>
                <p class="precio">35.90€</p>
                <button class="btn-add" onclick="agregar('Whiskey Escocés', 45.90)">Añadir a la cesta</button>
            </div>

            <div class="producto-card">
                <img src="https://media.istockphoto.com/id/1187149805/es/foto/pouring-whiskey-from-bottle-into-glass.jpg?s=612x612&w=0&k=20&c=dNZOHpphVqQ135NZJaUPfEQlGvAIBg3F49uP1BEgrp4=" alt="Ron">
                <h3>Ron Añejo Especial</h3>
                <p class="precio">28.00€</p>
                <button class="btn-add" onclick="agregar('Ron Añejo Especial', 28.00)">Añadir a la cesta</button>
            </div>

            <div class="producto-card">
                <img src="https://ginbruni.com/wp-content/uploads/2022/07/copa-para-gin-tonic-1024x512.jpg" alt="Ginebra">
                <h3>Ginebra Dry</h3>
                <p class="precio">32.50€</p>
                <button class="btn-add" onclick="agregar('Ginebra Dry', 32.50)">Añadir a la cesta</button>
            </div>

            <div class="producto-card">
                <img src="https://img.freepik.com/foto-gratis/vodka-vasos-chupito-madera-rustica_127657-1420.jpg?w=2000" alt="Vodka">
                <h3>Vodka Pure</h3>
                <p class="precio">24.00€</p>
                <button class="btn-add" onclick="agregar('Vodka Pure', 24.00)">Añadir a la cesta</button>
            </div>

            <div class="producto-card">
                <img src="https://static.carrefour.es/hd_1600x_/img_pim_food/264354_00_2.jpg" alt="Licor">
                <h3>Licor de Hierbas</h3>
                <p class="precio">15.75€</p>
                <button class="btn-add" onclick="agregar('Licor de Hierbas', 15.75)">Añadir a la cesta</button>
            </div>

        </div>
    </main>

    <script>
        function agregar(nombre, precio) {
            let cesta = JSON.parse(localStorage.getItem('cesta')) || [];
            let item = cesta.find(i => i.nombre === nombre);
            if(item) {
                item.cantidad += 1;
            } else {
                cesta.push({nombre: nombre, precio: precio, cantidad: 1});
            }
            localStorage.setItem('cesta', JSON.stringify(cesta));
            alert("Has añadido: " + nombre);
        }
    </script>
</body>
</html>
