<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Finalizar Pedido | The Vintage Cellar</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="productos.html">Productos</a>
        <a href="detalles.html">Comparativa</a>
        <a href="pedido.html">Pedido</a>
    </nav>

    <main>
        <h2 style="text-align: center; color: var(--color-oro);">Tu Cesta de Compra</h2>
        
        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>P. Unitario</th>
                    <th>Cantidad</th>
                    <th>Subtotal</th>
                </tr>
            </thead>
            <tbody id="cuerpo-cesta"></tbody>
        </table>
        
        <div style="text-align: right; margin-bottom: 20px;">
            <h3 style="color: var(--color-oro); font-size: 1.8rem;">TOTAL: <span id="total">0.00</span>€</h3>
            <button onclick="vaciar()" style="background: #600; color: white; padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px;">Vaciar Cesta</button>
        </div>

        <hr style="border: 0; border-top: 1px solid #333; margin: 40px 0;">

        <form action="#" method="post">
            <fieldset>
                <legend>Datos de Envío y Contacto</legend>
                
                <p>
                    <label>Nombre Completo:</label><br>
                    <input type="text" name="nombre" required minlength="4" style="width: 100%; max-width: 400px; padding: 8px; background: #333; color: white; border: 1px solid #555;">
                </p>

                <p>
                    <label>Dirección de Entrega:</label><br>
                    <input type="text" name="direccion" required style="width: 100%; max-width: 400px; padding: 8px; background: #333; color: white; border: 1px solid #555;">
                </p>

                <p>
                    <label>Correo Electrónico:</label><br>
                    <input type="email" name="email" placeholder="ejemplo@correo.com" required style="width: 100%; max-width: 400px; padding: 8px; background: #333; color: white; border: 1px solid #555;">
                </p>

                <p>
                    <label>Número de Teléfono:</label><br>
                    <input type="tel" name="telefono" placeholder="600 000 000" required style="width: 100%; max-width: 400px; padding: 8px; background: #333; color: white; border: 1px solid #555;">
                </p>

                <div style="margin-top: 25px;">
                    <input type="submit" value="FINALIZAR COMPRA" class="btn-add" style="width: auto; padding: 12px 40px; background: var(--color-oro); border: none; cursor: pointer; font-weight: bold;">
                </div>
            </fieldset>
        </form>
    </main>

    <script>
        function renderCesta() {
            let cesta = JSON.parse(localStorage.getItem('cesta')) || [];
            let tabla = document.getElementById('cuerpo-cesta');
            let totalAcumulado = 0;
            if (cesta.length === 0) {
                tabla.innerHTML = "<tr><td colspan='4'>Cesta vacía</td></tr>";
                document.getElementById('total').innerText = "0.00";
                return;
            }
            tabla.innerHTML = "";
            cesta.forEach(item => {
                let sub = item.precio * item.cantidad;
                totalAcumulado += sub;
                tabla.innerHTML += `<tr><td>${item.nombre}</td><td>${item.precio.toFixed(2)}€</td><td>${item.cantidad}</td><td>${sub.toFixed(2)}€</td></tr>`;
            });
            document.getElementById('total').innerText = totalAcumulado.toFixed(2);
        }
        function vaciar() { localStorage.removeItem('cesta'); renderCesta(); }
        window.onload = renderCesta;
    </script>
</body>
</html>
